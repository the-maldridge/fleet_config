---
- hosts: all
  become: yes
  become_user: root
  become_method: sudo
  roles:
    - ssh_keys
    - xbps-repoconf
    - xbps_ignore
    - void.network.dns
    - mmc_drivers
    - chrony

- hosts: static_net
  become: yes
  become_user: root
  become_method: sudo
  roles:
    - void.network.static
